name: Daily Macro Pulse Report

on:
  schedule:
    # BEGIN GENERATED SCHEDULES
    # KR | 17:00 KST | 08:00 UTC | Mon-Fri
    - cron: '00 08 * * 1-5'
    # US | 06:30 KST | 21:30 UTC | Tue-Sat KST
    - cron: '30 21 * * 1-5'
    # END GENERATED SCHEDULES
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      REPORT_FORMAT_CONFIG: config/report_formats.json
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build runtime image
      run: docker build -t macro-pulse:daily .

    - name: Run unit tests in Docker
      run: |
        docker run --rm \
          -v "$PWD:/app" \
          -w /app \
          macro-pulse:daily \
          sh -lc "python -m unittest discover tests 2>&1 | tee unit-test.log"

    - name: Run Macro Pulse Bot in Docker
      run: |
        docker run --rm \
          -e REPORT_FORMAT_CONFIG \
          -e SMTP_USERNAME \
          -e SMTP_PASSWORD \
          -e RECIPIENT_EMAIL \
          -e TELEGRAM_BOT_TOKEN \
          -e TELEGRAM_CHAT_ID \
          -v "$PWD:/app" \
          -w /app \
          macro-pulse:daily \
          sh -lc "python src/main.py 2>&1 | tee macro-pulse.log"
      
    - name: Validate generated report
      if: success()
      run: test -s macro_pulse_report.html

    - name: Prepare public directory
      if: success()
      run: |
        mkdir -p public
        mv macro_pulse_report.html public/index.html

    - name: Deploy to GitHub Pages
      if: success()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'

    - name: Upload workflow artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: daily-report-artifacts
        path: |
          macro_pulse_report.html
          public/index.html
          macro-pulse.log
          unit-test.log
        if-no-files-found: ignore

    - name: Send failure notification
      if: failure() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
      run: |
        curl --silent --show-error --fail \
          --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
          --data-urlencode "text=Macro Pulse workflow failed: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
          "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"
